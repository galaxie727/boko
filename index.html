<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ボコスカ試作</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  text-align:center;
}
.wrap{
  width:min(92vw,420px);
  margin:0 auto;
  padding:20px 0 40px;
}
h1{
  margin:10px 0 18px;
  font-size:28px;
  font-weight:800;
}
#game{
  width:100%;
  aspect-ratio:3/5;
  position:relative;
  background:#222;
  border:3px solid #666;
  overflow:hidden;
}
#player, #enemy{
  width:48px;
  height:48px;
  border-radius:12px;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:700;
  border:2px solid rgba(255,255,255,.55);
}
#player{
  background:#22c55e;
  bottom:20px;
  left:20px;
}
#enemy{
  background:#ef4444;
  top:20px;
  left:200px;
}
#log{
  margin:16px auto 8px;
  min-height:24px;
  font-size:18px;
  font-weight:700;
}
#info{
  font-size:18px;
  line-height:1.8;
  margin-bottom:14px;
}
.ctrl{
  display:flex;
  justify-content:center;
  gap:18px;
}
button{
  width:74px;
  height:60px;
  border:none;
  border-radius:14px;
  font-size:28px;
  background:#e5e7eb;
  color:#111;
}
</style>
</head>
<body>

<div class="wrap">
  <h1>ボコスカ試作</h1>

  <div id="game">
    <div id="player">王</div>
    <div id="enemy">敵</div>
  </div>

  <div id="log">敵に近づけ</div>

  <div id="info">
    勝率: <span id="rate">-</span><br>
    パワー: <span id="power">50</span><br>
    勝利数: <span id="wins">0</span>
  </div>

  <div class="ctrl">
    <button onclick="move(-1)">←</button>
    <button onclick="move(1)">→</button>
  </div>
</div>

<script>
let player = {
  x: 20,
  power: 50,
  wins: 0
};

let enemy = spawnEnemy();

function spawnEnemy(){
  return {
    x: Math.random()*260,
    power: 30 + Math.random()*40
  };
}

function update(){
  document.getElementById("player").style.left = player.x + "px";
  document.getElementById("enemy").style.left = enemy.x + "px";

  document.getElementById("power").innerText = Math.floor(player.power);
  document.getElementById("wins").innerText = player.wins;
}

function move(dir){
  player.x += dir * 20;

  if(player.x < 0) player.x = 0;
  if(player.x > 260) player.x = 260;

  checkBattle();
  update();
}

function checkBattle(){
  if(Math.abs(player.x - enemy.x) < 30){
    battle();
  }
}

function battle(){
  let rate = player.power / (player.power + enemy.power);
  let percent = Math.floor(rate * 100);

  document.getElementById("rate").innerText = percent + "%";
  document.getElementById("log").innerText = "戦闘！";

  setTimeout(() => {
    if(Math.random() < rate){
      player.power += 10;
      player.wins += 1;

      if(player.wins >= 3){
        document.getElementById("player").innerText = "将";
      }

      document.getElementById("log").innerText = "勝利！";
      enemy = spawnEnemy();
    } else {
      alert("ゲームオーバー");
      location.reload();
    }

    document.getElementById("rate").innerText = "-";
    update();
  }, 100);
}

update();
</script>

</body>
</html>
