<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>タップ移動テスト</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#111;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  overflow:hidden;
}
#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
    #222;
  background-size:48px 48px, 48px 48px, auto;
}
.chara{
  position:absolute;
  width:64px;
  height:64px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:800;
  color:#fff;
  border:2px solid rgba(255,255,255,.55);
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  user-select:none;
}
.c1{background:#ff6666;}
.c2{background:#66ccff;}
.c3{background:#66e68a;}
.c4{background:#ffcc66;color:#222;}
.active{
  box-shadow:
    0 0 0 4px rgba(255,255,255,.28),
    0 0 18px rgba(255,255,255,.28);
  transform:scale(1.05);
}
#ui{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  width:min(92vw,460px);
  z-index:20;
  pointer-events:none;
}
#status{
  margin:0 auto 10px;
  width:fit-content;
  max-width:100%;
  padding:8px 14px;
  border-radius:14px;
  background:rgba(0,0,0,.48);
  border:1px solid rgba(255,255,255,.12);
  font-size:16px;
  font-weight:700;
  text-align:center;
  backdrop-filter:blur(6px);
}
#selectRow{
  display:flex;
  justify-content:center;
  gap:10px;
  pointer-events:auto;
}
.pickBtn{
  width:72px;
  height:56px;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:800;
  background:#e5e7eb;
  color:#111;
}
.pickBtn.activeBtn{
  outline:3px solid rgba(255,255,255,.35);
}
#hint{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  padding:8px 14px;
  border-radius:14px;
  background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.1);
  font-size:14px;
  color:#ddd;
  backdrop-filter:blur(6px);
  pointer-events:none;
}
.flash{
  animation:flash .18s ease;
}
@keyframes flash{
  0%{transform:scale(1.05)}
  50%{transform:scale(1.12)}
  100%{transform:scale(1.05)}
}
</style>
</head>
<body>
<div id="game">
  <div id="hint">キャラをタップで選択 / 空いている場所タップで移動</div>
  <div id="ui">
    <div id="status">選択中: A</div>
    <div id="selectRow">
      <button class="pickBtn activeBtn" data-index="0">A</button>
      <button class="pickBtn" data-index="1">B</button>
      <button class="pickBtn" data-index="2">C</button>
      <button class="pickBtn" data-index="3">D</button>
    </div>
  </div>
</div>
<script>
const game = document.getElementById("game");
const statusEl = document.getElementById("status");
const pickBtns = [...document.querySelectorAll(".pickBtn")];
const SIZE = 64;
const STEP = 44;
const chars = [
  { name:"A", className:"c1", x:90,  y:160, el:null },
  { name:"B", className:"c2", x:190, y:160, el:null },
  { name:"C", className:"c3", x:290, y:160, el:null },
  { name:"D", className:"c4", x:390, y:160, el:null },
];
let active = 0;
function maxX(){ return window.innerWidth - SIZE - 8; }
function maxY(){ return window.innerHeight - SIZE - 110; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function createChars(){
  chars.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = `chara ${c.className}${i===active ? " active" : ""}`;
    el.textContent = c.name;
    el.dataset.index = i;
    c.el = el;
    game.appendChild(el);
    el.addEventListener("click", (e) => { e.stopPropagation(); selectChara(i); });
    el.addEventListener("touchstart", (e) => { e.stopPropagation(); }, {passive:true});
  });
}
function update(){
  chars.forEach((c, i) => {
    c.x = clamp(c.x, 8, maxX());
    c.y = clamp(c.y, 60, maxY());
    c.el.style.left = c.x + "px";
    c.el.style.top = c.y + "px";
    c.el.classList.toggle("active", i === active);
  });
  pickBtns.forEach((btn, i) => { btn.classList.toggle("activeBtn", i === active); });
  statusEl.textContent = `選択中: ${chars[active].name}`;
}
function selectChara(i){ active = i; update(); }
pickBtns.forEach(btn => {
  btn.addEventListener("click", () => { selectChara(Number(btn.dataset.index)); });
});
function moveActiveByTap(clientX, clientY){
  const c = chars[active];
  const xRatio = clientX / window.innerWidth;
  const yRatio = clientY / window.innerHeight;
  const centerLeft = 0.33;
  const centerRight = 0.67;
  const centerTop = 0.33;
  const centerBottom = 0.67;
  let moved = false;
  if(yRatio < centerTop){ c.y -= STEP; moved = true; }
  else if(yRatio > centerBottom){ c.y += STEP; moved = true; }
  else if(xRatio < centerLeft){ c.x -= STEP; moved = true; }
  else if(xRatio > centerRight){ c.x += STEP; moved = true; }
  c.x = clamp(c.x, 8, maxX());
  c.y = clamp(c.y, 60, maxY());
  if(moved){ c.el.classList.remove("flash"); void c.el.offsetWidth; c.el.classList.add("flash"); }
  update();
}
game.addEventListener("click", (e) => { moveActiveByTap(e.clientX, e.clientY); });
game.addEventListener("touchend", (e) => {
  const t = e.changedTouches[0];
  if(!t) return;
  moveActiveByTap(t.clientX, t.clientY);
}, {passive:true});
window.addEventListener("resize", update);
createChars();
update();
</script>
</body>
</html>
