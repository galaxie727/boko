<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チー娘移動テスト</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#222;
}

/* キャラ */
.chara{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:12px;
  text-align:center;
  line-height:60px;
  font-weight:bold;
}

.c1{background:#ff6666;}
.c2{background:#66ccff;}
.c3{background:#66ff99;}
.c4{background:#ffcc66;}

.active{
  outline:4px solid #fff;
}

/* UI */
#ui{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

button{
  padding:10px 15px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="game">
  <div class="chara c1 active" id="c1">A</div>
  <div class="chara c2" id="c2">B</div>
  <div class="chara c3" id="c3">C</div>
  <div class="chara c4" id="c4">D</div>

  <div id="ui">
    <button onclick="selectChara(0)">A</button>
    <button onclick="selectChara(1)">B</button>
    <button onclick="selectChara(2)">C</button>
    <button onclick="selectChara(3)">D</button>
  </div>
</div>

<script>

const chars = [
  {el:document.getElementById("c1"), x:100, y:100},
  {el:document.getElementById("c2"), x:200, y:100},
  {el:document.getElementById("c3"), x:300, y:100},
  {el:document.getElementById("c4"), x:400, y:100},
];

let active = 0;

function selectChara(i){
  chars[active].el.classList.remove("active");
  active = i;
  chars[active].el.classList.add("active");
}

/* 初期配置 */
function update(){
  chars.forEach(c=>{
    c.el.style.left = c.x+"px";
    c.el.style.top = c.y+"px";
  });
}
update();

/* 移動 */
const speed = 5;

document.addEventListener("keydown", e=>{
  let c = chars[active];

  if(e.key === "ArrowUp" || e.key === "w"){
    c.y -= speed;
  }
  if(e.key === "ArrowDown" || e.key === "s"){
    c.y += speed;
  }
  if(e.key === "ArrowLeft" || e.key === "a"){
    c.x -= speed;
  }
  if(e.key === "ArrowRight" || e.key === "d"){
    c.x += speed;
  }

  /* 仲間切替 */
  if(e.key === "1") selectChara(0);
  if(e.key === "2") selectChara(1);
  if(e.key === "3") selectChara(2);
  if(e.key === "4") selectChara(3);

  update();
});

</script>

</body>
</html>
