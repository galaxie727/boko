<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>パズル戦争 v2</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

#grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(10,1fr);
  height:100vh;
}

.cell{
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

.unit{
  width:90%;
  height:90%;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.king{background:#f59e0b}
.melee{background:#3b82f6}
.archer{background:#10b981}
.shield{background:#8b5cf6}
.enemy{background:#ef4444}

.move{background:rgba(255,255,255,.2)}
.attack{background:rgba(255,0,0,.2)}

.selected{
  outline:3px solid #fff;
}
</style>
</head>

<body>

<div id="grid"></div>

<script>
const W=8,H=10;

let selected=null;

const units=[
  {id:1,type:"king",x:1,y:8,move:3,range:1,power:20},
  {id:2,type:"melee",x:2,y:8,move:4,range:1,power:12},
  {id:3,type:"archer",x:3,y:8,move:3,range:3,power:8},
  {id:4,type:"shield",x:4,y:8,move:2,range:1,power:10},
];

let enemies=[
  {id:101,type:"enemy",x:3,y:2,power:10},
  {id:102,type:"enemy",x:5,y:3,power:10},
  {id:103,type:"enemy",x:2,y:4,power:10},
];

const grid=document.getElementById("grid");

function draw(){
  grid.innerHTML="";

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const cell=document.createElement("div");
      cell.className="cell";

      let u=units.find(u=>u.x===x&&u.y===y);
      let e=enemies.find(e=>e.x===x&&e.y===y);

      if(u){
        const div=document.createElement("div");
        div.className="unit "+u.type+(selected===u?" selected":"");
        div.textContent=u.type[0];

        div.onclick=()=>{
          selected=u;
          draw();
          showRange(u);
        };

        cell.appendChild(div);
      }

      if(e){
        const div=document.createElement("div");
        div.className="unit enemy";
        div.textContent="敵";
        cell.appendChild(div);
      }

      cell.dataset.x=x;
      cell.dataset.y=y;

      cell.onclick=()=>{
        if(!selected)return;

        const dx=Math.abs(x-selected.x);
        const dy=Math.abs(y-selected.y);
        const dist=dx+dy;

        // 移動
        if(dist<=selected.move){
          const blocked=units.some(u=>u.x===x&&u.y===y);
          if(!blocked){
            selected.x=x;
            selected.y=y;
          }
        }

        // 攻撃
        enemies=enemies.filter(e=>{
          const d=Math.abs(e.x-selected.x)+Math.abs(e.y-selected.y);
          if(d<=selected.range){
            if(selected.power>=e.power)return false;
          }
          return true;
        });

        selected=null;
        draw();
      };

      grid.appendChild(cell);
    }
  }
}

function showRange(u){
  const cells=document.querySelectorAll(".cell");
  cells.forEach(c=>{
    const x=+c.dataset.x;
    const y=+c.dataset.y;

    const dist=Math.abs(x-u.x)+Math.abs(y-u.y);

    if(dist<=u.move){
      c.classList.add("move");
    }
    if(dist<=u.range){
      c.classList.add("attack");
    }
  });
}

draw();
</script>

</body>
</html>
